<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Код подтверждения email</title>
</head>
<body style="font-family: sans-serif; line-height: 1.5; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
  <h1>Новый код подтверждения</h1>
  <p>Для адреса <strong>{{email}}</strong> был запрошен новый код подтверждения.</p>
  <p>Введите код в приложении:</p>
  <p style="font-size: 24px; letter-spacing: 4px; font-weight: bold; background: #f5f5f5; padding: 12px; border-radius: 8px;">{{code}}</p>
  <p>Код действителен в течение 1 часа.</p>
  <p>Если вы не запрашивали код, проигнорируйте это письмо.</p>
</body>
</html>
