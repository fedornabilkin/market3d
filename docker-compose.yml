services:
  db:
    image: postgres:15-alpine
    env_file:
      - ./backend/.env
    ports:
      - ${DB_PORT}:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
    ports:
      - ${PORT}:3000
    volumes:
      - ./backend/uploads:/app/uploads
    #depends_on:
    # db:
    #   condition: service_healthy

volumes:
  postgres_data:

